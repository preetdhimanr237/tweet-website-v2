{% extends "layout.html" %}

{% block content %}

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    min-height:100vh;
}

.login-card{
    background: rgba(255,255,255,.1);
    backdrop-filter: blur(12px);
    border: none;
    border-radius: 20px;
    color: white;
}

.login-card input{
    border-radius:12px;
    padding:12px;
    width:100%;
}

.login-card input:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.5);
}

.btn-login{
    border-radius:12px;
    padding:12px;
    font-size:18px;
}

.logo{
    font-size:55px;
}
</style>

<div class="container">

    <div class="row justify-content-center align-items-center" style="min-height:90vh;">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow-lg login-card">

                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <div class="logo">🦅</div>
                        <h2>Welcome Back</h2>
                        <p class="text-light">Login to your Tweet account</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            {{ form.username }}
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            {{ form.password }}
                        </div>

                        {% if form.errors %}
                            <div class="text-danger mb-2">
                                Invalid username or password
                            </div>
                        {% endif %}

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-login">
                                Login
                            </button>
                        </div>

                    </form>

                    <hr class="text-light">

                    <p class="text-center mb-0">
                        Don't have an account?
                        <a class="text-warning fw-bold" href="{% url 'register' %}">
                            Register here
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
